<template>
    <lightning-card icon-name="utility:notification">
        <span slot="title" class="card-title">
            <lightning-icon icon-name="utility:alert" size="x-small" class="alert-icon"></lightning-icon>
            Notificaciones de Detección
        </span>
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refrescar"
                onclick={handleRefresh}
                class="refresh-btn">
            </lightning-button-icon>
        </div>

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
                <p class="loading-text">Cargando notificaciones...</p>
            </div>
        </template>

        <!-- Error -->
        <template lwc:if={error}>
            <div class="error-container">
                <lightning-icon icon-name="utility:error" size="small" variant="error"></lightning-icon>
                <p class="error-text">{error}</p>
            </div>
        </template>

        <!-- Alert list -->
        <template lwc:if={showContent}>
            <template lwc:if={hasAlerts}>
                <div class="alert-list">
                    <template for:each={alerts} for:item="alert">
                        <div key={alert.taskId} class="alert-card">
                            <div class="alert-indicator"></div>
                            <div class="alert-body">
                                <div class="alert-header">
                                    <span class="alert-camera">
                                        <lightning-icon icon-name="utility:video" size="xx-small" class="cam-icon"></lightning-icon>
                                        {alert.cameraName}
                                    </span>
                                    <span class="alert-date">{alert.formattedDate}</span>
                                </div>
                                <template lwc:if={alert.contactName}>
                                    <p class="alert-contact">
                                        <lightning-icon icon-name="utility:user" size="xx-small" class="user-icon"></lightning-icon>
                                        {alert.contactName}
                                    </p>
                                </template>
                                <div class="alert-action">
                                    <button class="clip-link-btn"
                                            data-id={alert.taskId}
                                            onclick={handleOpenClip}>
                                        <lightning-icon icon-name="utility:play" size="xx-small" class="play-icon"></lightning-icon>
                                        Ver clip de seguridad
                                    </button>
                                    <lightning-button-icon
                                        icon-name="utility:delete"
                                        alternative-text="Eliminar"
                                        variant="bare"
                                        size="small"
                                        data-id={alert.taskId}
                                        onclick={handleDeleteOne}
                                        class="delete-alert-btn">
                                    </lightning-button-icon>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Empty state -->
            <template lwc:else>
                <div class="empty-state">
                    <div class="empty-icon-wrapper">
                        <lightning-icon icon-name="utility:notification" size="large" class="empty-icon"></lightning-icon>
                    </div>
                    <p class="empty-text">No hay notificaciones de detección</p>
                    <p class="empty-subtext">
                        Las notificaciones aparecerán aquí cuando el sistema
                        de IA detecte una persona y grabe un clip.
                    </p>
                </div>
            </template>
        </template>
    </lightning-card>

    <!-- ═══ MODAL: Reproductor de vídeo ═══ -->
    <template lwc:if={showPlayer}>
        <section class="slds-modal slds-fade-in-open slds-modal_large"
                 role="dialog"
                 aria-modal="true"
                 aria-label="Reproductor de clip">
            <div class="slds-modal__container">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={handleClosePlayer}>
                    <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    <span class="slds-assistive-text">Cerrar</span>
                </button>
                <div class="slds-modal__header modal-header">
                    <h2 class="slds-modal__title modal-title">{selectedAlert.cameraName}</h2>
                    <p class="modal-subtitle">{selectedAlert.formattedDate}</p>
                </div>
                <div class="slds-modal__content slds-p-around_medium modal-content">
                    <video controls autoplay class="clip-player" key={selectedAlert.clipUrl}>
                        <source src={selectedAlert.clipUrl} type="video/webm" />
                        Tu navegador no soporta la reproducción de vídeo.
                    </video>
                </div>
                <div class="slds-modal__footer modal-footer">
                    <button class="slds-button slds-button_neutral" onclick={handleClosePlayer}>Cerrar</button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
