<template>
    <div class="main-grid">

        <div class="map-container">
            <img src={mapImageUrl} class="map-image" alt="Plano de la Casa">

            <template for:each={cameras} for:item="cam">
                <div key={cam.Id} 
                     class="camera-pin" 
                     style={cam.cssStyle}
                     data-video={cam.Video_Url__c}
                     onclick={handlePinClick}
                     title={cam.Name}>
                     
                     <lightning-icon icon-name="utility:video" size="x-small" variant="inverse"></lightning-icon>
                </div>
            </template>
        </div>

        <div class="sidebar-container">
            <div class="placeholder-box">
                <p>Lista de Cámaras / Info</p>
                </div>
        </div>

        <div class="footer-container">
            <div class="placeholder-box">
                <p>Controles / Estado del Sistema</p>
            </div>
        </div>

    </div>

    <template if:true={isModalOpen}>
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="close-btn" onclick={closeModal}>&times;</button>
            <div class="video-wrapper">
                <iframe width="100%" height="100%" 
                        src={currentVideoUrl} 
                        frameborder="0" 
                        allow="autoplay; encrypted-media" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </template>
</template>
